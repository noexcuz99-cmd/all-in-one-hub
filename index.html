<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All In One Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Header -->
<div class="header">
  🔥 All In One Hub
</div>

<!-- Banner -->
<div class="banner">
  <img id="slider" src="https://via.placeholder.com/350x150">
</div>

<!-- Top Apps -->
<div class="top-apps">
  <h3>Top Apps</h3>
  <div class="scroll">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png" onclick="openApp('https://amazon.in')">
    <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" onclick="openApp('https://zomato.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" onclick="openApp('https://instagram.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" onclick="openApp('https://youtube.com')">
  </div>
</div>

<!-- Categories -->
<div class="grid">
  <button onclick="openApp('https://amazon.in')">🛒 Shopping</button>
  <button onclick="openApp('https://zomato.com')">🍔 Food</button>
  <button onclick="openApp('https://instagram.com')">📱 Social</button>
  <button onclick="openApp('https://youtube.com')">🎬 Entertainment</button>
  <button onclick="openApp('https://ola.com')">🚖 Ride</button>
  <button onclick="openApp('https://bigbasket.com')">🛍 Grocery</button>
</div>

<script src="script.js"></script>
</body>
</html>
